<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NSE: CARELOOP (2024–2026)</title>

<!-- Correct CDN -->
<script src="https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>

<style>
body{
    margin:0;
    background:#ffffff;
    font-family:Arial, sans-serif;
}
#chart{
    width:100%;
    height:100vh;
}
</style>
</head>
<body>

<div id="chart"></div>

<script>
document.addEventListener("DOMContentLoaded", function () {

    const chart = LightweightCharts.createChart(
        document.getElementById('chart'),
        {
            layout: {
                background: { color: '#ffffff' },
                textColor: '#000',
            },
            grid: {
                vertLines: { color: '#f0f0f0' },
                horzLines: { color: '#f0f0f0' },
            },
            rightPriceScale: {
                borderColor: '#ccc',
            },
            timeScale: {
                borderColor: '#ccc',
            },
        }
    );

    const candleSeries = chart.addCandlestickSeries({
        upColor: '#26a69a',
        downColor: '#ef5350',
        borderVisible: false,
        wickUpColor: '#26a69a',
        wickDownColor: '#ef5350',
    });

    // ===== DATA EXACTLY LIKE IMAGE =====

    const data = [

        // 2024 Stable around 600
        { time: '2024-01-01', open:580, high:620, low:560, close:600 },
        { time: '2024-03-01', open:600, high:630, low:590, close:610 },
        { time: '2024-06-01', open:610, high:640, low:600, close:620 },
        { time: '2024-09-01', open:620, high:650, low:610, close:630 },
        { time: '2024-12-01', open:630, high:660, low:620, close:640 },

        // 2025 Rally
        { time: '2025-02-01', open:640, high:720, low:630, close:700 },
        { time: '2025-04-01', open:700, high:780, low:690, close:760 },
        { time: '2025-06-01', open:760, high:820, low:750, close:800 }, // PEAK

        // 2025 Fall
        { time: '2025-08-01', open:800, high:810, low:650, close:700 },
        { time: '2025-09-01', open:700, high:720, low:600, close:620 },
        { time: '2025-10-01', open:620, high:630, low:500, close:520 },
        { time: '2025-11-01', open:520, high:540, low:300, close:320 },

        // 2026 Recovery
        { time: '2026-01-01', open:320, high:350, low:300, close:330 },
        { time: '2026-02-01', open:330, high:360, low:320, close:345 },
        { time: '2026-03-01', open:345, high:370, low:340, close:358 }, // Q1 ₹358

    ];

    candleSeries.setData(data);

    // ===== PRICE MARKERS =====

    candleSeries.createPriceLine({
        price: 800,
        color: '#000',
        lineWidth: 1,
        lineStyle: 2,
        axisLabelVisible: true,
        title: '2025 PEAK ₹800'
    });

    candleSeries.createPriceLine({
        price: 600,
        color: '#c62828',
        lineWidth: 1,
        lineStyle: 2,
        axisLabelVisible: true,
        title: '2024 ₹600'
    });

    candleSeries.createPriceLine({
        price: 358,
        color: '#00897b',
        lineWidth: 1,
        lineStyle: 2,
        axisLabelVisible: true,
        title: '2026 Q1 ₹358'
    });

    chart.timeScale().fitContent();

});
</script>

</body>
</html>
