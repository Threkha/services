<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NSE: CARELOOP Live Share Chart</title>

<script src="https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>

<style>
body{
    margin:0;
    background:#ffffff;
    font-family:Arial, sans-serif;
}
#chart{
    width:100%;
    height:100vh;
}
</style>
</head>
<body>

<div id="chart"></div>

<script>

document.addEventListener("DOMContentLoaded", function () {

    const chart = LightweightCharts.createChart(
        document.getElementById('chart'),
        {
            layout: {
                background: { color: '#ffffff' },
                textColor: '#000',
            },
            grid: {
                vertLines: { color: '#f0f0f0' },
                horzLines: { color: '#f0f0f0' },
            },
            rightPriceScale: {
                borderColor: '#ccc',
            },
            timeScale: {
                timeVisible: true,
                secondsVisible: true,
            },
        }
    );

    const candleSeries = chart.addCandlestickSeries({
        upColor: '#26a69a',
        downColor: '#ef5350',
        borderVisible: false,
        wickUpColor: '#26a69a',
        wickDownColor: '#ef5350',
    });

    // ===== STARTING VALUE =====
    let lastClose = 600;

    function generateCandle(time) {

        let open = lastClose;

        // Random up/down movement
        let change = (Math.random() - 0.5) * 40;
        let close = open + change;

        let high = Math.max(open, close) + Math.random() * 20;
        let low = Math.min(open, close) - Math.random() * 20;

        lastClose = close;

        return {
            time: time,
            open: parseFloat(open.toFixed(2)),
            high: parseFloat(high.toFixed(2)),
            low: parseFloat(low.toFixed(2)),
            close: parseFloat(close.toFixed(2)),
        };
    }

    // ===== INITIAL DATA (2024–2026 style start) =====
    let currentTime = Math.floor(Date.now() / 1000) - 60;

    let initialData = [];

    for (let i = 0; i < 50; i++) {
        initialData.push(generateCandle(currentTime));
        currentTime += 60;
    }

    candleSeries.setData(initialData);

    // ===== LIVE UPDATE EVERY SECOND =====
    setInterval(() => {

        let newCandle = generateCandle(currentTime);
        candleSeries.update(newCandle);

        currentTime += 60;

    }, 1000);

    chart.timeScale().fitContent();

});

</script>

</body>
</html>
