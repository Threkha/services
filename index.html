<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Careloop NSE Share Chart (2024–2026)</title>

<script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#f4f4f4;
}

#chart{
    width:100%;
    height:90vh;
}
</style>
</head>
<body>

<div id="chart"></div>

<script>

const chart = LightweightCharts.createChart(document.getElementById('chart'), {
    layout: {
        background: { color: '#ffffff' },
        textColor: '#000',
    },
    grid: {
        vertLines: { color: '#eee' },
        horzLines: { color: '#eee' },
    },
    rightPriceScale: {
        borderColor: '#ccc',
    },
    timeScale: {
        borderColor: '#ccc',
        timeVisible: false,
        secondsVisible: false,
    },
});

const candleSeries = chart.addCandlestickSeries({
    upColor: '#26a69a',
    downColor: '#ef5350',
    borderVisible: false,
    wickUpColor: '#26a69a',
    wickDownColor: '#ef5350',
});

/* ===========================
   CREATE PERFECT DATA
=========================== */

const data = [

/* 2024 - Stable around 600 */
{ time: '2024-01-01', open:580, high:620, low:560, close:600 },
{ time: '2024-04-01', open:600, high:630, low:580, close:610 },
{ time: '2024-07-01', open:610, high:640, low:600, close:620 },
{ time: '2024-10-01', open:620, high:650, low:610, close:630 },

/* 2025 Rally to Peak 800 */
{ time: '2025-01-01', open:630, high:700, low:620, close:690 },
{ time: '2025-03-01', open:690, high:760, low:680, close:740 },
{ time: '2025-06-01', open:740, high:820, low:730, close:800 }, // PEAK

/* 2025 Deep Fall */
{ time: '2025-09-01', open:800, high:810, low:650, close:700 },
{ time: '2025-10-01', open:700, high:720, low:600, close:620 },
{ time: '2025-11-01', open:620, high:630, low:500, close:520 },
{ time: '2025-12-01', open:520, high:540, low:300, close:320 },

/* 2026 Recovery */
{ time: '2026-01-01', open:320, high:350, low:300, close:330 },
{ time: '2026-02-01', open:330, high:360, low:320, close:345 },
{ time: '2026-03-01', open:345, high:370, low:340, close:358 }, // Q1 358

];

candleSeries.setData(data);

/* ===========================
   ADD PRICE LINES
=========================== */

// Peak ₹800 label
candleSeries.createPriceLine({
    price: 800,
    color: '#000',
    lineWidth: 1,
    lineStyle: LightweightCharts.LineStyle.Dotted,
    axisLabelVisible: true,
    title: '2025 SHARE PRICE (PEAK) ₹800'
});

// 2026 Q1 ₹358 label
candleSeries.createPriceLine({
    price: 358,
    color: '#00897b',
    lineWidth: 1,
    lineStyle: LightweightCharts.LineStyle.Dotted,
    axisLabelVisible: true,
    title: '2026 Q1 SHARE PRICE ₹358'
});

// 2024 ₹600 reference
candleSeries.createPriceLine({
    price: 600,
    color: '#c62828',
    lineWidth: 1,
    lineStyle: LightweightCharts.LineStyle.Dotted,
    axisLabelVisible: true,
    title: '2024 SHARE PRICE ₹600'
});

chart.timeScale().fitContent();

</script>

</body>
</html>
