<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CARELOOP Live Market Simulation</title>

<script src="https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>

<style>
body{
    margin:0;
    background:#ffffff;
    font-family:Arial, sans-serif;
}
#chart{
    width:100%;
    height:100vh;
}
</style>
</head>
<body>

<div id="chart"></div>

<script>

document.addEventListener("DOMContentLoaded", function () {

    const chart = LightweightCharts.createChart(
        document.getElementById('chart'),
        {
            layout: {
                background: { color: '#ffffff' },
                textColor: '#000',
            },
            grid: {
                vertLines: { color: '#f0f0f0' },
                horzLines: { color: '#f0f0f0' },
            },
            rightPriceScale: { borderColor: '#ccc' },
            timeScale: {
                timeVisible: true,
                secondsVisible: true,
            },
        }
    );

    const candleSeries = chart.addCandlestickSeries({
        upColor: '#26a69a',
        downColor: '#ef5350',
        borderVisible: false,
        wickUpColor: '#26a69a',
        wickDownColor: '#ef5350',
    });

    // ===== START PRICE =====
    let lastPrice = 600;
    let candle = null;
    let candleStartTime = Math.floor(Date.now() / 1000);
    let secondsPassed = 0;

    function startNewCandle() {
        candleStartTime = Math.floor(Date.now() / 1000);
        secondsPassed = 0;

        candle = {
            time: candleStartTime,
            open: lastPrice,
            high: lastPrice,
            low: lastPrice,
            close: lastPrice,
        };
    }

    // Create first candle
    startNewCandle();
    candleSeries.setData([candle]);

    // ===== LIVE MOVEMENT EVERY SECOND =====
    setInterval(() => {

        secondsPassed++;

        // Small gradual movement
        let change = (Math.random() - 0.5) * 10;
        lastPrice = lastPrice + change;

        // Update candle values
        candle.high = Math.max(candle.high, lastPrice);
        candle.low = Math.min(candle.low, lastPrice);
        candle.close = lastPrice;

        candleSeries.update({
            time: candle.time,
            open: parseFloat(candle.open.toFixed(2)),
            high: parseFloat(candle.high.toFixed(2)),
            low: parseFloat(candle.low.toFixed(2)),
            close: parseFloat(candle.close.toFixed(2)),
        });

        // After 60 seconds → new candle
        if (secondsPassed >= 60) {
            startNewCandle();
        }

    }, 1000);

    chart.timeScale().fitContent();

});
</script>

</body>
</html>
